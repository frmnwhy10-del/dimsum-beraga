<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasir Dimsum Beraga</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial; padding:20px; }
input, select, button { padding:8px; margin:5px 0; width:100%; }
button { background:#28a745; color:white; border:none; }
.summary { margin-top:20px; background:#f4f4f4; padding:10px; }
</style>
</head>
<body>

<h2>Kasir & Pembukuan Harian</h2>

<label>Jam Buka:</label>
<input type="time" id="jamBuka">

<label>Jam Tutup:</label>
<input type="time" id="jamTutup">

<hr>

<label>Nama Menu:</label>
<input type="text" id="menu">

<label>Harga:</label>
<input type="number" id="harga">

<label>Jumlah:</label>
<input type="number" id="jumlah">

<label>Pembayaran:</label>
<select id="metode">
<option value="Tunai">Tunai</option>
<option value="QR">QR</option>
</select>

<button onclick="tambahTransaksi()">Tambah Transaksi</button>

<div class="summary">
<h3>Rekap Hari Ini</h3>
<p>Total Tunai: Rp <span id="totalTunai">0</span></p>
<p>Total QR: Rp <span id="totalQR">0</span></p>
<p><strong>Total Omzet: Rp <span id="totalOmzet">0</span></strong></p>
</div>

<button onclick="exportPDF()">Download Pembukuan PDF</button>

<script>
let totalTunai = 0;
let totalQR = 0;
let transaksi = [];

function tambahTransaksi(){
let menu = document.getElementById("menu").value;
let harga = parseInt(document.getElementById("harga").value);
let jumlah = parseInt(document.getElementById("jumlah").value);
let metode = document.getElementById("metode").value;

let total = harga * jumlah;

if(metode === "Tunai"){
totalTunai += total;
}else{
totalQR += total;
}

transaksi.push({menu, harga, jumlah, metode, total});

document.getElementById("totalTunai").innerText = totalTunai;
document.getElementById("totalQR").innerText = totalQR;
document.getElementById("totalOmzet").innerText = totalTunai + totalQR;

document.getElementById("menu").value="";
document.getElementById("harga").value="";
document.getElementById("jumlah").value="";
}

function exportPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let jamBuka = document.getElementById("jamBuka").value;
let jamTutup = document.getElementById("jamTutup").value;

doc.text("Pembukuan Harian Dimsum Beraga", 10, 10);
doc.text("Jam Buka: " + jamBuka, 10, 20);
doc.text("Jam Tutup: " + jamTutup, 10, 30);

let y = 40;
transaksi.forEach((t,i)=>{
doc.text((i+1)+". "+t.menu+" | "+t.metode+" | Rp "+t.total, 10, y);
y += 10;
});

doc.text("Total Tunai: Rp " + totalTunai, 10, y+10);
doc.text("Total QR: Rp " + totalQR, 10, y+20);
doc.text("Total Omzet: Rp " + (totalTunai+totalQR), 10, y+30);

doc.save("Pembukuan-Harian-Dimsum-Beraga.pdf");
}
</script>

</body>
</html>
