<script>
let totalTunai = 0;
let totalQR = 0;
let transaksi = [];
let menuDipilih = null;

function simpanData(){
localStorage.setItem("totalTunai", totalTunai);
localStorage.setItem("totalQR", totalQR);
localStorage.setItem("transaksi", JSON.stringify(transaksi));
}

function loadData(){
totalTunai = parseInt(localStorage.getItem("totalTunai")) || 0;
totalQR = parseInt(localStorage.getItem("totalQR")) || 0;
transaksi = JSON.parse(localStorage.getItem("transaksi")) || [];

document.getElementById("totalTunai").innerText = totalTunai;
document.getElementById("totalQR").innerText = totalQR;
document.getElementById("totalOmzet").innerText = totalTunai + totalQR;
}

let sekarang = new Date();

if(!localStorage.getItem("jamBuka")){
localStorage.setItem("jamBuka", sekarang.toLocaleTimeString());
localStorage.setItem("tanggal", sekarang.toLocaleDateString());
}

document.getElementById("tanggal").innerText = localStorage.getItem("tanggal");
document.getElementById("jamBuka").innerText = localStorage.getItem("jamBuka");
document.getElementById("jamTutup").innerText = localStorage.getItem("jamTutup") || "-";

loadData();

function pilihMenu(nama,harga){
menuDipilih = {nama,harga};
alert("Menu dipilih: " + nama);
}

function bayar(metode){
if(!menuDipilih){
alert("Pilih menu dulu!");
return;
}

let total = menuDipilih.harga;

if(metode === "Tunai"){
totalTunai += total;
}else{
totalQR += total;
}

transaksi.push({
nama: menuDipilih.nama,
metode: metode,
total: total
});

document.getElementById("totalTunai").innerText = totalTunai;
document.getElementById("totalQR").innerText = totalQR;
document.getElementById("totalOmzet").innerText = totalTunai + totalQR;

menuDipilih = null;
simpanData();
}

function tutupToko(){
let tutup = new Date().toLocaleTimeString();
localStorage.setItem("jamTutup", tutup);
document.getElementById("jamTutup").innerText = tutup;
}

function resetData(){
localStorage.clear();
location.reload();
}
</script>
