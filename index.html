<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Dimsum Beraga Mobile PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:10px;
  background:#fff8f0;
}

h2{text-align:center;color:#c0392b;}

.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.menu button{
  padding:18px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#e67e22;
  color:white;
}

table{
  width:100%;
  margin-top:10px;
  font-size:14px;
}

th,td{
  border-bottom:1px solid #ddd;
  padding:5px;
  text-align:center;
}

.total{
  font-size:20px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn{
  width:100%;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  color:white;
}

.tunai{background:#2980b9;}
.qris{background:#8e44ad;}
.rekap{background:#27ae60;}
.reset{background:#c0392b;}

.struk{
  background:white;
  margin-top:15px;
  padding:10px;
  border:1px dashed black;
  font-size:13px;
}

.summary-box{
  background:#ffe8d6;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.rekap-card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  font-size:14px;
}

.rekap-header{
  font-weight:bold;
  color:#c0392b;
  margin-bottom:6px;
}

.rekap-total{
  font-weight:bold;
  margin-top:6px;
  color:#27ae60;
}

.rekap-metode{
  font-size:13px;
  color:#555;
}
</style>
</head>

<body>

<h2>🍜 Dimsum Beraga</h2>

<div class="menu">
<button onclick="tambah('Dimsum Ayam',15000)">Dimsum Ayam</button>
<button onclick="tambah('Dimsum Udang',18000)">Dimsum Udang</button>
<button onclick="tambah('Hakau',20000)">Hakau</button>
<button onclick="tambah('Siomay Kepiting',17000)">Siomay Kepiting</button>
<button onclick="tambah('Es Teh',5000)">Es Teh</button>
<button onclick="tambah('Teh Hangat',4000)">Teh Hangat</button>
</div>

<table>
<thead>
<tr>
<th>Menu</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<div class="total">Total: <span id="total">Rp 0</span></div>

<input type="number" id="uangBayar" placeholder="Uang bayar (untuk Tunai)">

<div class="total">Kembalian: <span id="kembalian">Rp 0</span></div>

<button class="btn tunai" onclick="prosesPembayaran('Tunai')">💵 BAYAR TUNAI</button>
<button class="btn qris" onclick="prosesPembayaran('QRIS')">📱 BAYAR QRIS</button>
<button class="btn rekap" onclick="downloadPDF()">📄 DOWNLOAD REKAP PDF</button>
<button class="btn reset" onclick="resetKasir()">RESET DATA</button>

<h3>🧾 Nota Terakhir</h3>
<div id="strukArea"></div>

<h3>📊 Rekap Hari Ini</h3>
<div id="rekapArea"></div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {};
let riwayat = JSON.parse(localStorage.getItem("riwayat")) || [];
let totalHarian = parseInt(localStorage.getItem("totalHarian")) || 0;
let totalTunai = parseInt(localStorage.getItem("totalTunai")) || 0;
let totalQRIS = parseInt(localStorage.getItem("totalQRIS")) || 0;
let lastStruk = localStorage.getItem("lastStruk") || "";
let total = 0;

function formatRupiah(angka){
  return "Rp " + angka.toLocaleString("id-ID");
}

function simpan(){
  localStorage.setItem("data", JSON.stringify(data));
  localStorage.setItem("riwayat", JSON.stringify(riwayat));
  localStorage.setItem("totalHarian", totalHarian);
  localStorage.setItem("totalTunai", totalTunai);
  localStorage.setItem("totalQRIS", totalQRIS);
  localStorage.setItem("lastStruk", lastStruk);
}

function tambah(nama,harga){
  if(!data[nama]) data[nama]={harga:harga,qty:1};
  else data[nama].qty++;
  render();
  simpan();
}

function render(){
  let html=""; total=0;
  for(let item in data){
    let subtotal=data[item].harga*data[item].qty;
    total+=subtotal;
    html+=`
      <tr>
        <td>${item}</td>
        <td>${data[item].qty}</td>
        <td>${formatRupiah(subtotal)}</td>
      </tr>`;
  }
  document.getElementById("tabel").innerHTML=html;
  document.getElementById("total").innerText=formatRupiah(total);
}

function prosesPembayaran(metode){
  if(total===0) return alert("Belum ada pesanan!");

  let bayar=parseInt(document.getElementById("uangBayar").value)||0;
  let kembalian=0;

  if(metode==="Tunai"){
    if(bayar<total) return alert("Uang kurang!");
    kembalian=bayar-total;
  }

  document.getElementById("kembalian").innerText=formatRupiah(kembalian);

  let waktu=new Date().toLocaleString();
  let pesananCopy=JSON.parse(JSON.stringify(data));

  let detailStr="";
  for(let item in pesananCopy){
    detailStr+=`${item} (${pesananCopy[item].qty}x)<br>`;
  }

  lastStruk=`
  <div class="struk">
  <center><b>Dimsum Beraga</b></center>
  ${waktu}<br><br>
  ${detailStr}
  ----------------<br>
  Total: ${formatRupiah(total)}<br>
  Bayar: ${formatRupiah(bayar)}<br>
  Kembali: ${formatRupiah(kembalian)}<br>
  Metode: ${metode}<br>
  ----------------<br>
  Terima Kasih 🙏
  </div>
  `;

  document.getElementById("strukArea").innerHTML=lastStruk;

  riwayat.push({waktu,metode,total,pesanan:pesananCopy});
  totalHarian+=total;
  if(metode==="Tunai") totalTunai+=total;
  else totalQRIS+=total;

  data={};
  document.getElementById("uangBayar").value="";
  render();
  updateRekap();
  simpan();
}

function updateRekap(){

  let html=`
  <div class="summary-box">
    <b>📊 Ringkasan Hari Ini</b><br><br>
    Total Harian: ${formatRupiah(totalHarian)}<br>
    💵 Tunai: ${formatRupiah(totalTunai)}<br>
    📱 QRIS: ${formatRupiah(totalQRIS)}
  </div>
  `;

  riwayat.slice().reverse().forEach((trx,i)=>{
    html+=`
    <div class="rekap-card">
      <div class="rekap-header">
        🧾 Transaksi ${riwayat.length - i}
      </div>
      <div style="font-size:12px;color:#777;">
        ${trx.waktu}
      </div><br>
    `;

    for(let item in trx.pesanan){
      html+=`• ${item} (${trx.pesanan[item].qty}x)<br>`;
    }

    html+=`
      <div class="rekap-metode">
        Metode: ${trx.metode}
      </div>
      <div class="rekap-total">
        Total: ${formatRupiah(trx.total)}
      </div>
    </div>
    `;
  });

  document.getElementById("rekapArea").innerHTML=html;
}

function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.text("Rekap Harian Dimsum Beraga",10,10);
  let y=20;

  riwayat.forEach((trx,i)=>{
    doc.text(`${i+1}. ${trx.waktu}`,10,y); y+=8;
    for(let item in trx.pesanan){
      doc.text(`${item} (${trx.pesanan[item].qty}x)`,15,y);
      y+=8;
    }
    doc.text(`Metode: ${trx.metode}`,10,y); y+=8;
    doc.text(`Total: ${formatRupiah(trx.total)}`,10,y); y+=12;
    if(y>270){ doc.addPage(); y=10; }
  });

  doc.text(`Total Harian: ${formatRupiah(totalHarian)}`,10,y+5);
  doc.save("rekap_dimsum_beraga.pdf");
}

function resetKasir(){
  localStorage.clear();
  location.reload();
}

render();
updateRekap();
document.getElementById("strukArea").innerHTML=lastStruk;
</script>

</body>
</html>
