<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasir Dimsum Beraga</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial; margin:0; padding:10px; background:#fff8f0; }
h2 { text-align:center; color:#c0392b; font-size:20px; }

.menu button {
  width:48%; margin:1%; padding:12px;
  background:#e67e22; color:white; border:none;
  border-radius:8px; font-size:14px;
}

table { width:100%; margin-top:10px; border-collapse:collapse; font-size:12px; }
th, td { border:1px solid #ccc; padding:5px; text-align:center; }

.total { font-size:16px; font-weight:bold; margin-top:10px; }

button { padding:10px; margin-top:5px; width:100%; border:none; border-radius:8px; }

.tunai { background:#27ae60; color:white; }
.qris { background:#8e44ad; color:white; }
.export { background:#2980b9; color:white; }
.reset { background:#c0392b; color:white; }

input, textarea {
  width:100%; padding:8px; margin-top:5px;
  border-radius:6px; border:1px solid #ccc;
}

#nota {
  background:white;
  padding:10px;
  margin-top:10px;
  border:1px dashed black;
  font-size:12px;
}
</style>
</head>
<body>

<h2>🍜 Kasir Dimsum Beraga</h2>

<div class="menu">
<button onclick="tambah('Dimsum Ayam',15000)">Dimsum Ayam - 15k</button>
<button onclick="tambah('Dimsum Udang',18000)">Dimsum Udang - 18k</button>
<button onclick="tambah('Hakau',20000)">Hakau - 20k</button>
<button onclick="tambah('Siomay Kepiting',17000)">Siomay Kepiting - 17k</button>
<button onclick="tambah('Es Teh',5000)">Es Teh - 5k</button>
<button onclick="tambah('Teh Hangat',4000)">Teh Hangat - 4k</button>
</div>

<table>
<thead>
<tr>
<th>Menu</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<div class="total">Total: Rp <span id="total">0</span></div>

<textarea id="keterangan" placeholder="Keterangan Pesanan (contoh: pedas, tanpa bawang)"></textarea>

<input type="number" id="bayar" placeholder="Uang Bayar (jika tunai)" oninput="hitungKembalian()">
<div>Kembalian: Rp <span id="kembalian">0</span></div>

<button class="tunai" onclick="prosesPembayaran('Tunai')">Bayar Tunai</button>
<button class="qris" onclick="prosesPembayaran('QRIS')">Bayar QRIS</button>

<button class="export" onclick="downloadRekap()">Download Rekap PDF</button>
<button class="reset" onclick="resetKasir()">Reset Transaksi</button>

<div id="nota"></div>

<script>
let data = JSON.parse(localStorage.getItem("transaksiAktif")) || {};
let rekap = JSON.parse(localStorage.getItem("rekapHarian")) || [];
let total = 0;

render();

function tambah(nama, harga) {
    if (!data[nama]) {
        data[nama] = { harga: harga, qty: 1 };
    } else {
        data[nama].qty += 1;
    }
    simpan();
    render();
}

function render() {
    let tabel = "";
    total = 0;

    for (let item in data) {
        let subtotal = data[item].harga * data[item].qty;
        total += subtotal;
        tabel += `<tr>
            <td>${item}</td>
            <td>${data[item].harga}</td>
            <td>${data[item].qty}</td>
            <td>${subtotal}</td>
        </tr>`;
    }

    document.getElementById("tabel").innerHTML = tabel;
    document.getElementById("total").innerText = total;
    tampilkanNota();
}

function hitungKembalian(){
    let bayar = document.getElementById("bayar").value;
    let kembali = bayar - total;
    document.getElementById("kembalian").innerText = kembali > 0 ? kembali : 0;
}

function prosesPembayaran(metode){
    if(total === 0) return alert("Belum ada pesanan!");

    let waktu = new Date().toLocaleString();
    let keterangan = document.getElementById("keterangan").value;
    let bayar = document.getElementById("bayar").value || 0;
    let kembali = bayar - total;

    rekap.push({
        waktu,
        pesanan: JSON.parse(JSON.stringify(data)),
        total,
        metode,
        bayar,
        kembali,
        keterangan
    });

    localStorage.setItem("rekapHarian", JSON.stringify(rekap));
    alert("Pembayaran berhasil!");

    resetKasir();
}

function tampilkanNota(){
    let isi = `<b>=== NOTA ===</b><br>`;
    for(let item in data){
        isi += `${item} x${data[item].qty}<br>`;
    }
    isi += `----------------<br>`;
    isi += `Total: Rp ${total}<br>`;
    isi += `==============`;
    document.getElementById("nota").innerHTML = isi;
}

function downloadRekap(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("REKAP HARIAN DIMSUM BERAGA",10,10);

    let y = 20;
    let totalHarian = 0;

    rekap.forEach((trx,i)=>{
        doc.text(`${i+1}. ${trx.waktu}`,10,y); y+=7;
        for(let item in trx.pesanan){
            let sub = trx.pesanan[item].harga * trx.pesanan[item].qty;
            doc.text(`- ${item} x${trx.pesanan[item].qty} = ${sub}`,15,y);
            y+=7;
        }
        doc.text(`Keterangan: ${trx.keterangan}`,15,y); y+=7;
        doc.text(`Metode: ${trx.metode}`,15,y); y+=7;
        doc.text(`Total: Rp ${trx.total}`,15,y); y+=10;

        totalHarian += trx.total;
        if(y > 270){ doc.addPage(); y=10; }
    });

    doc.text(`TOTAL PENGHASILAN HARI INI: Rp ${totalHarian}`,10,y+10);

    doc.save("rekap_harian_dimsum.pdf");
}

function resetKasir(){
    data = {};
    total = 0;
    document.getElementById("bayar").value="";
    document.getElementById("kembalian").innerText="0";
    document.getElementById("keterangan").value="";
    simpan();
    render();
}

function simpan(){
    localStorage.setItem("transaksiAktif", JSON.stringify(data));
}
</script>

</body>
</html>
