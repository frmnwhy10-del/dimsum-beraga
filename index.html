<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Dimsum Beraga - Mobile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:10px;
  background:#fff8f0;
}

h2{
  text-align:center;
  color:#c0392b;
}

.menu{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

.menu button{
  padding:20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#e67e22;
  color:white;
}

table{
  width:100%;
  margin-top:10px;
  font-size:14px;
}

th,td{
  border-bottom:1px solid #ddd;
  padding:5px;
  text-align:center;
}

.total{
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}

input{
  width:100%;
  padding:15px;
  font-size:18px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.bayar-btn{
  width:100%;
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  color:white;
}

.tunai{ background:#2980b9; }
.qris{ background:#8e44ad; }
.reset{ background:#c0392b; }

.struk{
  background:white;
  margin-top:15px;
  padding:10px;
  border:1px dashed black;
  font-size:14px;
}
</style>
</head>

<body>

<h2>🍜 Dimsum Beraga</h2>

<div class="menu">
<button onclick="tambah('Dimsum Ayam',15000)">Dimsum Ayam</button>
<button onclick="tambah('Dimsum Udang',18000)">Dimsum Udang</button>
<button onclick="tambah('Hakau',20000)">Hakau</button>
<button onclick="tambah('Siomay Kepiting',17000)">Siomay Kepiting</button>
<button onclick="tambah('Es Teh',5000)">Es Teh</button>
<button onclick="tambah('Teh Hangat',4000)">Teh Hangat</button>
</div>

<table>
<thead>
<tr>
<th>Menu</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<div class="total">Total: <span id="total">Rp 0</span></div>

<input type="number" id="uangBayar" placeholder="Masukkan uang bayar (Tunai)">

<button class="bayar-btn tunai" onclick="prosesPembayaran('Tunai')">💵 BAYAR TUNAI</button>
<button class="bayar-btn qris" onclick="prosesPembayaran('QRIS')">📱 BAYAR QRIS</button>
<button class="bayar-btn reset" onclick="resetKasir()">RESET DATA</button>

<div class="total">Kembalian: <span id="kembalian">Rp 0</span></div>

<h3>🧾 Struk</h3>
<div id="strukArea"></div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {};
let totalHarian = parseInt(localStorage.getItem("totalHarian")) || 0;
let total = 0;

function formatRupiah(angka){
  return "Rp " + angka.toLocaleString("id-ID");
}

function simpan(){
  localStorage.setItem("data", JSON.stringify(data));
  localStorage.setItem("totalHarian", totalHarian);
}

function tambah(nama,harga){
  if(!data[nama]) data[nama]={harga:harga,qty:1};
  else data[nama].qty++;
  render();
  simpan();
}

function render(){
  let html="";
  total=0;
  for(let item in data){
    let subtotal=data[item].harga*data[item].qty;
    total+=subtotal;
    html+=`
      <tr>
        <td>${item}</td>
        <td>${data[item].qty}</td>
        <td>${formatRupiah(subtotal)}</td>
      </tr>`;
  }
  document.getElementById("tabel").innerHTML=html;
  document.getElementById("total").innerText=formatRupiah(total);
}

function prosesPembayaran(metode){
  if(total===0) return alert("Belum ada pesanan!");

  let bayar=parseInt(document.getElementById("uangBayar").value)||0;
  let kembalian=0;

  if(metode==="Tunai"){
    if(bayar<total) return alert("Uang kurang!");
    kembalian=bayar-total;
  }

  document.getElementById("kembalian").innerText=formatRupiah(kembalian);

  let waktu=new Date().toLocaleString();
  let detail="";
  for(let item in data){
    detail+=`${item} (${data[item].qty}x)<br>`;
  }

  document.getElementById("strukArea").innerHTML=`
    <div class="struk">
    <center><b>Dimsum Beraga</b></center>
    ${waktu}<br><br>
    ${detail}
    ----------------<br>
    Total: ${formatRupiah(total)}<br>
    Bayar: ${formatRupiah(bayar)}<br>
    Kembali: ${formatRupiah(kembalian)}<br>
    Metode: ${metode}<br>
    ----------------<br>
    Terima Kasih 🙏
    </div>
  `;

  totalHarian+=total;
  data={};
  document.getElementById("uangBayar").value="";
  render();
  simpan();
}

function resetKasir(){
  localStorage.clear();
  location.reload();
}

render();
</script>

</body>
</html>
