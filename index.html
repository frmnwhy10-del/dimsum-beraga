<script>
let data = {};
let total = 0;

let riwayat = [];
let totalHarian = 0;
let totalTunai = 0;
let totalQRIS = 0;

function tambah(nama, harga) {
    if (!data[nama]) {
        data[nama] = { harga: harga, qty: 1 };
    } else {
        data[nama].qty += 1;
    }
    render();
}

function render() {
    let tabel = "";
    total = 0;

    for (let item in data) {
        let subtotal = data[item].harga * data[item].qty;
        total += subtotal;

        tabel += `<tr>
            <td>${item}</td>
            <td>${data[item].harga}</td>
            <td>${data[item].qty}</td>
            <td>${subtotal}</td>
        </tr>`;
    }

    document.getElementById("tabel").innerHTML = tabel;
    document.getElementById("total").innerText = total;
}

function prosesPembayaran() {
    if (total === 0) {
        alert("Belum ada pesanan!");
        return;
    }

    let metode = document.getElementById("metode").value;
    let waktu = new Date().toLocaleString();

    // Buat detail pesanan
    let detailPesanan = "";
    for (let item in data) {
        detailPesanan += `${item} (${data[item].qty}x), `;
    }

    riwayat.push({
        waktu: waktu,
        metode: metode,
        total: total,
        detail: detailPesanan
    });

    totalHarian += total;

    if (metode === "Tunai") {
        totalTunai += total;
    } else {
        totalQRIS += total;
    }

    updateRekap();
    data = {};
    total = 0;
    render();
}

function updateRekap() {
    document.getElementById("totalHarian").innerText = totalHarian;
    document.getElementById("totalTunai").innerText = totalTunai;
    document.getElementById("totalQRIS").innerText = totalQRIS;

    // Tampilkan riwayat detail di bawah rekap
    let html = "";
    riwayat.forEach((trx, index) => {
        html += `
        <p>
        <b>${index+1}.</b> ${trx.waktu} <br>
        Pesanan: ${trx.detail} <br>
        Metode: ${trx.metode} <br>
        Total: Rp ${trx.total}
        </p>
        <hr>`;
    });

    if (document.getElementById("riwayatTransaksi")) {
        document.getElementById("riwayatTransaksi").innerHTML = html;
    }
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Dimsum Beraga", 10, 10);
    doc.text("Rekap Transaksi Harian", 10, 20);

    let y = 30;

    riwayat.forEach((trx, index) => {
        doc.text(`${index+1}. ${trx.waktu}`, 10, y);
        y += 8;
        doc.text(`Pesanan: ${trx.detail}`, 10, y);
        y += 8;
        doc.text(`Metode: ${trx.metode} | Total: Rp ${trx.total}`, 10, y);
        y += 12;
    });

    doc.text(`Total Harian: Rp ${totalHarian}`, 10, y + 5);
    doc.text(`Tunai: Rp ${totalTunai}`, 10, y + 12);
    doc.text(`QRIS: Rp ${totalQRIS}`, 10, y + 19);

    doc.save("rekap_harian_dimsum_beraga.pdf");
}

function resetKasir() {
    data = {};
    riwayat = [];
    total = 0;
    totalHarian = 0;
    totalTunai = 0;
    totalQRIS = 0;
    render();
    updateRekap();
}
</script>
