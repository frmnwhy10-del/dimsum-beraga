<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasir Dimsum Beraga</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial; padding: 15px; background:#fff8f0; }
h2 { text-align:center; color:#c0392b; }
.menu button {
  width:48%; margin:1%; padding:10px;
  background:#e67e22; color:white; border:none;
}
table { width:100%; margin-top:10px; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:5px; text-align:center; }
.total { font-size:18px; font-weight:bold; margin-top:10px; }
button { padding:10px; margin-top:5px; width:100%; border:none; }
.export { background:#27ae60; color:white; }
.reset { background:#c0392b; color:white; }
</style>
</head>
<body>

<h2>🍜 Kasir Dimsum Beraga</h2>

<div class="menu">
<button onclick="tambah('Dimsum Ayam',15000)">Dimsum Ayam - 15k</button>
<button onclick="tambah('Dimsum Udang',18000)">Dimsum Udang - 18k</button>
<button onclick="tambah('Hakau',20000)">Hakau - 20k</button>
<button onclick="tambah('Siomay Kepiting',17000)">Siomay Kepiting - 17k</button>
<button onclick="tambah('Es Teh',5000)">Es Teh - 5k</button>
<button onclick="tambah('Teh Hangat',4000)">Teh Hangat - 4k</button>
</div>

<table>
<thead>
<tr>
<th>Menu</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<div class="total">Total: Rp <span id="total">0</span></div>

<button class="export" onclick="downloadPDF()">Download Rekap PDF</button>
<button class="reset" onclick="resetKasir()">Reset Transaksi</button>

<script>
let data = {};
let total = 0;

function tambah(nama, harga) {
    if (!data[nama]) {
        data[nama] = { harga: harga, qty: 1 };
    } else {
        data[nama].qty += 1;
    }
    render();
}

function render() {
    let tabel = "";
    total = 0;
    for (let item in data) {
        let subtotal = data[item].harga * data[item].qty;
        total += subtotal;
        tabel += `<tr>
            <td>${item}</td>
            <td>${data[item].harga}</td>
            <td>${data[item].qty}</td>
            <td>${subtotal}</td>
        </tr>`;
    }
    document.getElementById("tabel").innerHTML = tabel;
    document.getElementById("total").innerText = total;
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Dimsum Beraga", 10, 10);
    doc.text("Rekap Transaksi", 10, 20);

    let y = 30;
    for (let item in data) {
        let subtotal = data[item].harga * data[item].qty;
        doc.text(`${item} - ${data[item].qty} x ${data[item].harga} = ${subtotal}`, 10, y);
        y += 10;
    }

    doc.text(`Total: Rp ${total}`, 10, y + 10);
    doc.save("rekap_dimsum_beraga.pdf");
}

function resetKasir() {
    data = {};
    total = 0;
    render();
}
</script>

</body>
</html>
